name: Build Chrome Extension

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'manifest.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: filtered-chrome
          path: |
            **/*
            !.git/**
            !.github/**
            !README.md
            !LICENSE